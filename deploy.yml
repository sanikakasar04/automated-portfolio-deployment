name: Deploy Static Site to GitHub Pages

# 1. This tells GitHub to run the pipeline whenever you push to the 'main' branch
on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

# 2. Sets the permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 3. Ensures we don't run multiple deployments at the exact same time
concurrency:
  group: "pages"
  cancel-in-progress: false

# 4. The actual deployment steps
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload HTML/CSS files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Grabs everything in the root directory
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
